---
- name: Verifying compliance of beats agents
  hosts: elk
  vars:
    beats:
      - filebeat
      - metricbeat
      - packetbeat
      - auditbeat

  tasks:

  - name: Checking if directory is present
    stat:
      path: "/etc/{{ item }}/"
    with_items: "{{ beats }}"
    register: status

  - name: Reporting if directory exists
    debug:
      msg: "{{ item.item }} exists"
    with_items: "{{ status.results }}"
    when: item.stat.isdir is defined and item.stat.isdir

  - name: Copying from server if directory does not exist
    copy:
      src: "~/ansible/files/{{ item.item }}/" 
      dest: "/etc/{{ item.item }}/"
    with_items: "{{ status.results }}"
    when: not item.stat.exists

  - name: Set the permissions on the directory
    file:
      path: "/etc/{{ item.item }}/"
      state: directory
      owner: root
      group: root
      mode: '0540'
    with_items: "{{ status.results }}"
    when: item.stat.exists

  - name: Checking if file is present
    stat:
      path: "/etc/{{ item }}/{{ item }}.yml"
    with_items: "{{ beats }}"
    register: status

  - name: Reporting if file exists
    debug:
      msg: "{{ item.item }} exists"
    with_items: "{{ status.results }}"
    when: item.stat.exists

  - name: Copying from server if file not found
    copy:
      src: "~/ansible/files/{{ item.item }}.yml" 
      dest: "/etc/{{ item.item }}/{{ item.item }}.yml"
    with_items: "{{ status.results }}"
    when: not item.stat.exists

  - name: Starting and enabling service
    service:
      name: "{{ item.item }}"
      enabled: yes
      state: started
    with_items: "{{ status.results }}"
    when: item.stat.exists

